[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "warn"
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "Marvin Attack in `rsa` crate. Transitively pulled by `jsonwebtoken` for RSA-family JWT verification. No upstream fix available — the `rsa` crate does not yet provide constant-time implementations. Systemprompt mitigations: (1) recommended signing algorithms for customer IdP tokens are ES256 / ES384 / EdDSA, which do not execute the vulnerable RSA path; (2) JWT verification is CPU-bounded and not exposed as an unauthenticated high-throughput endpoint, limiting exploitability of the timing side-channel; (3) tracked — we will drop the ignore as soon as a fixed `rsa` release is available. See documentation/security/threat-model.md §4.1." },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "BUSL-1.1",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
