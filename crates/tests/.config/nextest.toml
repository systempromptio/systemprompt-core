# nextest configuration for the systemprompt test workspace.
#
# The `ci` profile exists so a hung or leaking test fails fast and is named in
# the run output, instead of starving the hosted runner until it loses
# communication (the failure mode that kept the Test/Coverage jobs red).

# The seeded scheduler tests share one `services` table; `reconcile()` sweeps and
# deletes every row outside its own config as an orphan, so a concurrent run would
# delete another test's seeded row mid-assertion. Serialise them into one slot.
#
# The OAuth repository tests share one `oauth_clients` table; the cleanup tests
# exercise table-wide `DELETE`s (`cleanup_unused_clients`/`cleanup_stale_clients`
# with a zero-day cutoff, `cleanup_inactive`), which delete clients another test
# seeded and is mid-assertion on (and break its auth-code foreign key). Serialise
# the whole repository suite so no cleanup runs concurrently with a client seed.
#
# The seeded job tests run jobs (`MaliciousIpBlacklistJob`, `BehavioralAnalysisJob`)
# that scan whole tables (`user_sessions`, `fingerprint_reputation`) and skip
# already-banned IPs, so a concurrent run's job bans another test's seeded IP first
# and that test then observes zero newly-banned rows. The bootstrap-dispatch and
# job-execution tests additionally share the one inventory-registered
# `cleanup_inactive_sessions` scheduled_jobs row, so a concurrent run flips its
# status mid-assertion. Serialise the suite into one slot so each test's job sees
# only its own seeded data.
# The users-domain DB tests share the `users` table and its `email`/`name`
# UNIQUE indexes. The federated-identity tests run concurrent
# `find_or_create_federated` INSERTs whose synthetic local emails collide on
# that index, and the user-service create/update tests churn rows another test
# is counting. Serialise the DB-backed suite so each test owns its row mutations.
#
# The generator DB tests (`sitemap_generator_db`, `pipeline_full`,
# `prerender_public_db`) each overwrite the one shared on-disk `web/config.yaml`
# + `content/config.yaml` before running a generator entry point that reads them
# back. A per-module mutex cannot stop a sibling module rewriting the config
# mid-run, so a concurrent test reads another test's source config and asserts on
# the wrong output. Serialise the whole config-writing suite into one slot.
#
# The messaging dispatch and full-router tests share one dispatchable agent
# backend: a fixed-name `services` row (`test_messaging_agent`) repointed at each
# test's own wiremock port. A concurrent run would overwrite another test's
# backend port mid-dispatch, sending its reply to the wrong mock. Serialise the
# whole messaging suite into one slot so each test owns the backend row.
[test-groups]
messaging-dispatch-db = { max-threads = 1 }
scheduler-services-db = { max-threads = 1 }
scheduler-jobs-db = { max-threads = 1 }
oauth-clients-db = { max-threads = 1 }
users-db = { max-threads = 1 }
generator-config-db = { max-threads = 1 }
api-health-monitor-db = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(systemprompt-api-integration-tests) and test(/(messaging_dispatch|routes_slack|routes_teams)::/)'
test-group = 'messaging-dispatch-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-api-integration-tests) and test(/(messaging_dispatch|routes_slack|routes_teams)::/)'
test-group = 'messaging-dispatch-db'

[[profile.default.overrides]]
filter = 'package(systemprompt-scheduler-tests) and test(/(state_verifier_seeded_db|service_management_db|service_management_behaviour_db|reconciler_db)::/)'
test-group = 'scheduler-services-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-scheduler-tests) and test(/(state_verifier_seeded_db|service_management_db|service_management_behaviour_db|reconciler_db)::/)'
test-group = 'scheduler-services-db'

[[profile.default.overrides]]
filter = 'package(systemprompt-agent-integration-tests) and test(/agent_service_repo_e2e::/)'
test-group = 'scheduler-services-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-agent-integration-tests) and test(/agent_service_repo_e2e::/)'
test-group = 'scheduler-services-db'

[[profile.default.overrides]]
filter = 'package(systemprompt-scheduler-tests) and test(/(jobs_seeded_db|bootstrap_dispatch_db|job_execution_db|start_owner_resolution_db)::/)'
test-group = 'scheduler-jobs-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-scheduler-tests) and test(/(jobs_seeded_db|bootstrap_dispatch_db|job_execution_db|start_owner_resolution_db)::/)'
test-group = 'scheduler-jobs-db'

[[profile.default.overrides]]
filter = 'package(systemprompt-oauth-tests) and test(/repository::/)'
test-group = 'oauth-clients-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-oauth-tests) and test(/repository::/)'
test-group = 'oauth-clients-db'

[[profile.default.overrides]]
filter = 'package(systemprompt-users-tests) and test(/(repository::federated_identity|repository::device_cert|services::device_cert_service|services::user_service)::/)'
test-group = 'users-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-users-tests) and test(/(repository::federated_identity|repository::device_cert|services::device_cert_service|services::user_service)::/)'
test-group = 'users-db'

[[profile.default.overrides]]
filter = 'package(systemprompt-generator-tests) and test(/(sitemap_generator_db|pipeline_full|prerender_public_db)::/)'
test-group = 'generator-config-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-generator-tests) and test(/(sitemap_generator_db|pipeline_full|prerender_public_db)::/)'
test-group = 'generator-config-db'

[profile.default]
# A test still running after 60s is flagged slow; after 3 such periods (180s)
# nextest terminates it and reports the failure. Real tests finish in ms — only
# a genuine hang reaches this ceiling.
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci]
slow-timeout = { period = "60s", terminate-after = 3 }
fail-fast = false
failure-output = "immediate-final"
final-status-level = "slow"

[profile.ci.junit]
path = "junit.xml"

[[profile.default.overrides]]
filter = 'package(systemprompt-api-integration-tests) and test(/health_monitor::/)'
test-group = 'api-health-monitor-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-api-integration-tests) and test(/health_monitor::/)'
test-group = 'api-health-monitor-db'

# The MCP loader tests register uniquely-named `services` rows and assert on
# their status while the MCP orchestrator/database tests run sweeps
# (`sync_database_state`, `reconcile`) that unregister every row absent from
# their own (empty) registry config, and the proxy-health tests mark every
# running row with an unresponsive port as stopped. Serialise them into the
# shared services-table slot so no sweep runs mid-assertion.
[[profile.default.overrides]]
filter = 'package(systemprompt-mcp-tests) and test(/(loader_live|orchestrator_extended|orchestrator_smoke|database_state|database_state_extended|database_sync|database_service|lifecycle_deep|lifecycle_smoke|proxy_health)::/)'
test-group = 'scheduler-services-db'

[[profile.ci.overrides]]
filter = 'package(systemprompt-mcp-tests) and test(/(loader_live|orchestrator_extended|orchestrator_smoke|database_state|database_state_extended|database_sync|database_service|lifecycle_deep|lifecycle_smoke|proxy_health)::/)'
test-group = 'scheduler-services-db'
