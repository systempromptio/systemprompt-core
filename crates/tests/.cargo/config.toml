# Test workspace cargo configuration
#
# Inherits from root .cargo/config.toml but overrides settings that
# conflict with test tooling (coverage instrumentation, caching).
#
# Why: The root config uses Cranelift (fast dev builds) and sccache
# (compilation caching). Both break cargo-llvm-cov:
#   - Cranelift doesn't support -Cinstrument-coverage (LLVM-only)
#   - sccache serves cached uninstrumented binaries, so profraw
#     files are never written
#
# This config uses the LLVM backend and disables sccache so that
# `cargo llvm-cov --manifest-path crates/tests/Cargo.toml` works
# correctly.

[env]
DATABASE_URL = "postgres://systemprompt_admin:3e00fcdac26b5b731829e8737515db8f@localhost:5432/systemprompt-web"
SYSTEMPROMPT_PROFILE = "/var/www/html/systemprompt-template/.systemprompt/profiles/local/profile.yaml"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[unstable]
codegen-backend = true

[profile.dev]
codegen-backend = "llvm"
