[package]
name = "systemprompt-bench"
version = "0.0.1"
edition = "2024"
publish = false

[workspace]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
tokio = { version = "1", features = ["full"] }
serde_json = "1.0"
chrono = "0.4"
systemprompt-models = { path = "../../shared/models" }
systemprompt-identifiers = { path = "../../shared/identifiers" }
systemprompt-events = { path = "../../infra/events" }

[[bench]]
name = "serde_throughput"
harness = false

[[bench]]
name = "task_construction"
harness = false

[[bench]]
name = "event_broadcast"
harness = false
