[package]
name = "systemprompt-models"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Foundation data models for systemprompt.io AI governance infrastructure. Shared DTOs, config, and domain types consumed by every layer of the MCP governance pipeline."
readme = "README.md"

[lints]
workspace = true

[dependencies]
# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
indexmap = { workspace = true }

# Error handling
thiserror = { workspace = true }
async-trait = { workspace = true }

# Secret hygiene: wipe credential material from memory on drop
zeroize = { workspace = true }

# Logging
tracing = { workspace = true }

# Module loading
serde_yaml = { workspace = true }

# HTTP types for context propagation
http = { workspace = true }

# URL parsing for outbound-endpoint (SSRF) validation
url = { workspace = true }

# Optional: sqlx::Type derives for DB-persisted enums (feature `sqlx`)
sqlx = { workspace = true, optional = true }

# Validation

# JSON Schema generation
schemars = { workspace = true }

# Regex
regex = { workspace = true }

# Crypto (manifest signing seed: random generation + base64 persistence)

# Async streaming
futures = { workspace = true }

# Wire codecs: SSE byte buffering + stream adaptation
bytes = { workspace = true }
futures-util = { workspace = true }

# Web framework (optional, for IntoResponse implementations)
axum = { workspace = true, optional = true }

# Shared traits, identifiers, and extension framework
systemprompt-traits = { workspace = true }
systemprompt-identifiers = { workspace = true }
systemprompt-extension = { workspace = true }
systemprompt-provider-contracts = { workspace = true }

# MCP protocol
rmcp = { workspace = true }

[features]
default = []
web = ["dep:axum"]
sqlx = ["dep:sqlx"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dev-dependencies]
tempfile = { workspace = true }
