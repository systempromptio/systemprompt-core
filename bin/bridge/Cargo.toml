[workspace]

[package]
name = "systemprompt-bridge"
version = "0.9.2"
edition = "2024"
authors = ["Edward Burton"]
license = "BUSL-1.1"
description = "Credential helper + plugin/MCP sync agent that bridges multiple coding agents (Claude Desktop, Codex CLI) to the systemprompt.io gateway."
publish = false

build = "build.rs"

[lib]
name = "systemprompt_bridge"
path = "src/lib.rs"

[build-dependencies]
winresource = "0.1"
vergen = { version = "8", features = ["build", "git", "gitcl"] }

[[bin]]
name = "systemprompt-bridge"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order", "raw_value"] }
toml = "0.8"
time = { version = "0.3", features = ["serde", "formatting", "parsing"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
dirs = "5"
sha2 = "0.10"
ed25519-dalek = { version = "2", default-features = false, features = ["std", "pkcs8"] }
base64 = "0.22"
serde_jcs = "0.1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "env-filter", "json"] }
tracing-appender = "0.2"
backtrace = "0.3"
opener = { version = "0.7", features = ["reveal"] }
zip = { version = "8", default-features = false, features = ["deflate"] }
uuid = { version = "1", features = ["v4"] }
zeroize = { version = "1", features = ["zeroize_derive"] }
tokio = { version = "1.49", features = ["rt-multi-thread", "net", "io-util", "time", "sync", "macros"] }
tokio-util = "0.7"
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["server", "server-auto", "tokio"] }
http-body-util = "0.1"
http = "1.0"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
url = "2.5"
futures-util = "0.3"
bytes = "1"
parking_lot = "0.12"
arc-swap = "1"
async-trait = "0.1"
ctrlc = "3"
is-terminal = "0.4"
rand = "0.8"
systemprompt-identifiers = { path = "../../crates/shared/identifiers", version = "0.12.0", default-features = false }
systemprompt-models = { path = "../../crates/shared/models", version = "0.12.0", default-features = false }
hostname = "0.4"
ts-rs = { version = "10", optional = true }
# Why: OAuth client_secret moves off disk into the OS keystore. v3 needs explicit
# native-backend feature flags per platform; `linux-native-sync-persistent` uses
# Secret Service synchronously (matches our blocking store/load API). Distros
# without libsecret will fail at runtime; document via tracing::warn at the call
# site rather than swapping to a file-backed fallback that recreates the bug we
# are fixing.
keyring = { version = "3", features = ["apple-native", "windows-native", "linux-native-sync-persistent"] }

[features]
default = []
dev-stub-host = []
ts-export = ["dep:ts-rs"]

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"
core-foundation = "0.10"
core-foundation-sys = "0.8"
tray-icon = "0.19"
muda = "0.15"
winit = "0.30"
wry = { version = "0.55", default-features = false, features = ["os-webview", "protocol", "devtools"] }
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(target_os = "windows")'.dependencies]
tray-icon = "0.19"
muda = "0.15"
winit = "0.30"
wry = { version = "0.55", default-features = false, features = ["os-webview", "protocol", "devtools"] }
image = { version = "0.25", default-features = false, features = ["png"] }
raw-window-handle = "0.6"
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Security_Cryptography",
    "Win32_Storage_FileSystem",
    "Win32_System_Console",
    "Win32_System_Diagnostics_ToolHelp",
    "Win32_System_Registry",
    "Win32_System_Threading",
] }

[lints.rust]
unsafe_code = "deny"
missing_debug_implementations = "warn"
missing_copy_implementations = "warn"
trivial_casts = "warn"
trivial_numeric_casts = "warn"
unused_import_braces = "warn"
unused_qualifications = "warn"
variant_size_differences = "warn"
unreachable_pub = "warn"
unused_lifetimes = "warn"
single_use_lifetimes = "warn"

[lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
suspicious = { level = "deny", priority = -1 }

cargo_common_metadata = "allow"
multiple_crate_versions = "allow"
return_self_not_must_use = "allow"
must_use_candidate = "allow"
trivially_copy_pass_by_ref = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_possible_wrap = "allow"
format_push_string = "allow"
uninlined_format_args = "allow"
result_unit_err = "allow"
missing_docs_in_private_items = "allow"
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
derive_partial_eq_without_eq = "allow"
cognitive_complexity = "allow"
unwrap_or_default = "allow"
redundant_pub_crate = "allow"

unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
let_underscore_must_use = "deny"
exit = "deny"
rc_mutex = "deny"

allow_attributes = "warn"
allow_attributes_without_reason = "warn"
self_named_module_files = "warn"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"

[profile.release-debug]
inherits = "release"
strip = "none"
debug = "line-tables-only"
panic = "unwind"
