[package]
name = "systemprompt-cowork"
version = "0.4.0"
edition = "2024"
authors = ["Edward Burton"]
license = "BUSL-1.1"
description = "Credential helper + plugin/MCP sync agent for Anthropic's Claude Cowork, targeting the systemprompt.io gateway."
publish = false

[lib]
name = "systemprompt_cowork"
path = "src/lib.rs"

[[bin]]
name = "systemprompt-cowork"
path = "src/main.rs"

[dependencies]
ureq = { version = "2", default-features = false, features = ["tls", "json"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
rustls-native-certs = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
toml = "0.8"
time = { version = "0.3", features = ["serde", "formatting", "parsing"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
dirs = "5"
sha2 = "0.10"
ed25519-dalek = { version = "2", default-features = false, features = ["std", "pkcs8"] }
base64 = "0.22"
serde_jcs = "0.1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "env-filter"] }

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"
tray-icon = "0.19"
muda = "0.15"
winit = "0.30"
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(target_os = "windows")'.dependencies]
tray-icon = "0.19"
muda = "0.15"
winit = "0.30"
image = { version = "0.25", default-features = false, features = ["png"] }

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"

[profile.release-debug]
inherits = "release"
strip = "none"
debug = "line-tables-only"
panic = "unwind"
