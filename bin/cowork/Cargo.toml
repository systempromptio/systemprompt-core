[workspace]

[package]
name = "systemprompt-cowork"
version = "0.4.0"
edition = "2024"
authors = ["Edward Burton"]
license = "BUSL-1.1"
description = "Credential helper + plugin/MCP sync agent for Anthropic's Claude Cowork, targeting the systemprompt.io gateway."
publish = false

build = "build.rs"

[lib]
name = "systemprompt_cowork"
path = "src/lib.rs"

[target.'cfg(target_os = "windows")'.build-dependencies]
winresource = "0.1"

[[bin]]
name = "systemprompt-cowork"
path = "src/main.rs"

[dependencies]
ureq = { version = "2", default-features = false, features = ["tls", "json"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
rustls-native-certs = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
toml = "0.8"
time = { version = "0.3", features = ["serde", "formatting", "parsing"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
dirs = "5"
sha2 = "0.10"
ed25519-dalek = { version = "2", default-features = false, features = ["std", "pkcs8"] }
base64 = "0.22"
serde_jcs = "0.1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "env-filter"] }
zeroize = { version = "1", features = ["zeroize_derive"] }
tokio = { version = "1.49", features = ["rt-multi-thread", "net", "io-util", "time", "sync", "macros"] }
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["server", "server-auto", "tokio"] }
http-body-util = "0.1"
http = "1.0"
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
futures-util = "0.3"
bytes = "1"
parking_lot = "0.12"
ctrlc = "3"
is-terminal = "0.4"
rand = "0.8"
form_urlencoded = "1"
systemprompt-identifiers = { version = "0.4.2", default-features = false }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"
tray-icon = "0.19"
muda = "0.15"
winit = "0.30"
wry = { version = "0.55", default-features = false, features = ["os-webview", "protocol"] }
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(target_os = "windows")'.dependencies]
tray-icon = "0.19"
muda = "0.15"
winit = "0.30"
wry = { version = "0.55", default-features = false, features = ["os-webview", "protocol"] }
image = { version = "0.25", default-features = false, features = ["png"] }
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_Security_Cryptography",
    "Win32_Storage_FileSystem",
    "Win32_System_Console",
    "Win32_System_Threading",
] }

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "warn"
panic = "deny"
todo = "deny"
unimplemented = "deny"
print_stdout = "warn"
print_stderr = "warn"
dbg_macro = "deny"
mod_module_files = "allow"
cast_possible_truncation = "warn"
cast_lossless = "warn"
needless_pass_by_value = "warn"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"

[profile.release-debug]
inherits = "release"
strip = "none"
debug = "line-tables-only"
panic = "unwind"
