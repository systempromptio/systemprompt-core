[package]
name = "systemprompt-cowork"
version = "0.3.3"
edition = "2024"
authors = ["Edward Burton"]
license = "BUSL-1.1"
description = "Credential helper + plugin/MCP sync agent for Anthropic's Claude Cowork, targeting the systemprompt.io gateway."
publish = false

[lib]
name = "systemprompt_cowork"
path = "src/lib.rs"

[[bin]]
name = "systemprompt-cowork"
path = "src/main.rs"

[dependencies]
ureq = { version = "2", default-features = false, features = ["tls", "json"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
rustls-native-certs = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
toml = "0.8"
time = { version = "0.3", features = ["serde", "formatting", "parsing"] }
dirs = "5"
sha2 = "0.10"
ed25519-dalek = { version = "2", default-features = false, features = ["std", "pkcs8"] }
base64 = "0.22"

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"
tray-icon = "0.19"
muda = "0.15"
winit = "0.30"
wry = "0.45"
image = { version = "0.25", default-features = false, features = ["png"] }
objc2 = "0.5"
objc2-foundation = { version = "0.2", features = ["NSString", "NSURL", "NSGeometry", "NSArray", "NSObject"] }
objc2-app-kit = { version = "0.2", features = [
    "NSApplication",
    "NSWindow",
    "NSResponder",
    "NSView",
    "NSWorkspace",
    "NSRunningApplication",
] }

[target.'cfg(target_os = "windows")'.dependencies.tray-icon]
version = "0.19"

[target.'cfg(target_os = "windows")'.dependencies.muda]
version = "0.15"

[target.'cfg(target_os = "windows")'.dependencies.winit]
version = "0.30"

[target.'cfg(target_os = "windows")'.dependencies.wry]
version = "0.45"

[target.'cfg(target_os = "windows")'.dependencies.image]
version = "0.25"
default-features = false
features = ["png"]

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Security_Credentials",
    "Win32_Security_Cryptography",
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Controls",
    "Win32_UI_Input_KeyboardAndMouse",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_System_Console",
    "Win32_UI_Shell",
] }

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"
