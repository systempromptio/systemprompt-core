name: systemprompt-cowork release

on:
  push:
    tags:
      - 'cowork-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --manifest-path bin/cowork/Cargo.toml --release --target ${{ matrix.target }}

      - name: Stage artifact (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/systemprompt-cowork dist/systemprompt-cowork-${{ matrix.target }}
          shasum -a 256 dist/systemprompt-cowork-${{ matrix.target }} > dist/systemprompt-cowork-${{ matrix.target }}.sha256

      - name: Stage artifact (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\systemprompt-cowork.exe dist\systemprompt-cowork-${{ matrix.target }}.exe
          certutil -hashfile dist\systemprompt-cowork-${{ matrix.target }}.exe SHA256 > dist\systemprompt-cowork-${{ matrix.target }}.exe.sha256
        shell: cmd

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          fail_on_unmatched_files: true
