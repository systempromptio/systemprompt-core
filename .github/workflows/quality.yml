name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  lint:
    name: Clippy lint baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - name: Strip dev-only cargo config (codegen-backend, sccache, mold)
        run: |
          python3 - <<'PY'
          import re, pathlib
          for path in (".cargo/config.toml", "crates/tests/.cargo/config.toml"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text()
              # `just lint` clippies the test workspace, which pins the unstable
              # codegen-backend, sccache, and `linker = clang` + `-fuse-ld=mold`.
              # The stable CI runner has none of these — drop them.
              s = re.sub(r'\n\[unstable\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\n\[profile\.dev\][^\[]*', '\n', s, flags=re.S)
              # Match to the next section header, not the '[' inside the
              # `rustflags = ["-C", ...]` array, or the array line is stranded.
              s = re.sub(r'\n\[target\.[^\]]*\].*?(?=\n\[|\Z)', '', s, flags=re.S)
              s = re.sub(r'\nRUSTC_WRAPPER\s*=.*', '', s)
              p.write_text(s)
          PY
      - run: just lint

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  file-size:
    name: Source file size guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - run: just file-size
