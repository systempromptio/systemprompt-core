name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  SQLX_OFFLINE: "true"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked

  sqlx-check:
    name: SQLx Offline Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify offline sqlx cache is current
        run: |
          if [ ! -d .sqlx ] && ! find crates -name .sqlx -type d | grep -q .; then
            echo "No .sqlx cache found; run 'just sqlx-prepare-publish' and commit."
            exit 1
          fi
      - run: cargo check --workspace --locked

  test:
    name: Test suite
    runs-on: ubuntu-latest
    # This job verifies tests pass; linting the (separate) test workspace
    # is not its job, so it does not inherit the `-D warnings` RUSTFLAGS.
    env:
      RUSTFLAGS: ""
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Strip [unstable] and [profile.dev] from cargo configs
        run: |
          python3 - <<'PY'
          import re, pathlib
          for path in (".cargo/config.toml", "crates/tests/.cargo/config.toml"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text()
              # The committed test config selects the unstable codegen-backend
              # and forces sccache; the stable CI toolchain has neither.
              s = re.sub(r'\n\[unstable\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\n\[profile\.dev\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\nRUSTC_WRAPPER\s*=.*', '', s)
              p.write_text(s)
          PY

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/tests

      - name: Migrate test database
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
        run: |
          cargo run \
            --manifest-path crates/tests/Cargo.toml \
            -p systemprompt-test-migrate \
            --release

      - name: Run test suite
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          SQLX_OFFLINE: "false"
        run: |
          cargo test \
            --manifest-path crates/tests/Cargo.toml \
            --workspace --lib
