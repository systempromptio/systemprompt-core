name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  SQLX_OFFLINE: "true"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --locked

  sqlx-check:
    name: SQLx Offline Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify offline sqlx cache is current
        run: |
          if [ ! -d .sqlx ] && ! find crates -name .sqlx -type d | grep -q .; then
            echo "No .sqlx cache found; run 'just sqlx-prepare-publish' and commit."
            exit 1
          fi
      - run: cargo check --workspace --locked

  test:
    # The test workspace (66 crates, ~12k tests) does not fit one free runner
    # in a single pass, so it is sharded by test-workspace path prefix: each
    # shard compiles and runs only its crates (shared core deps come from the
    # cache). Tests run under cargo-nextest with a per-test timeout, so a hung
    # or leaking test fails fast and is named instead of starving the runner
    # until it loses communication. `timeout-minutes` is the backstop.
    name: Test (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Prefixes are anchored at the test-workspace root (`/tests/`) so the
          # bridge `integration` crate is not double-matched by `/integration/`.
          - { group: shared, prefixes: "/tests/unit/shared/" }
          - { group: infra, prefixes: "/tests/unit/infra/" }
          - { group: domain, prefixes: "/tests/unit/domain/" }
          - { group: app-entry, prefixes: "/tests/unit/app/ /tests/unit/entry/" }
          - { group: bridge, prefixes: "/tests/unit/bridge/" }
          - { group: integration, prefixes: "/tests/integration/" }
          - { group: edge, prefixes: "/tests/concurrency/ /tests/property/ /tests/contract/" }
    # This job verifies tests pass; linting the (separate) test workspace
    # is not its job, so it does not inherit the `-D warnings` RUSTFLAGS.
    # Drop debuginfo and incremental artifacts: each shard's compile footprint
    # is small enough that codegen no longer needs serializing.
    env:
      RUSTFLAGS: ""
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_INCREMENTAL: "0"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Runner resources
        run: |
          echo "cores: $(nproc)"; free -h; df -h /

      - name: Strip [unstable] and [profile.dev] from cargo configs
        run: |
          python3 - <<'PY'
          import re, pathlib
          for path in (".cargo/config.toml", "crates/tests/.cargo/config.toml"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text()
              # The committed test config selects the unstable codegen-backend
              # and forces sccache; the stable CI toolchain has neither.
              s = re.sub(r'\n\[unstable\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\n\[profile\.dev\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\nRUSTC_WRAPPER\s*=.*', '', s)
              p.write_text(s)
          PY

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Per-shard key so shards don't clobber each other's cache.
          key: ${{ matrix.group }}
          workspaces: |
            .
            crates/tests
      - uses: taiki-e/install-action@nextest

      - name: Migrate test database
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          # Build the migrate tool against the committed .sqlx cache: the schema
          # it is about to create does not exist yet, so live query verification
          # of its core-crate dependencies would fail on a cold build cache.
          SQLX_OFFLINE: "true"
        run: |
          cargo run \
            --manifest-path crates/tests/Cargo.toml \
            -p systemprompt-test-migrate

      - name: Run shard
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          SQLX_OFFLINE: "false"
        run: |
          PKGS=$(cargo metadata --no-deps --format-version 1 \
                   --manifest-path crates/tests/Cargo.toml \
                 | jq -r --arg ps "${{ matrix.prefixes }}" '
                     ($ps | split(" ") | map(select(length > 0))) as $prefixes
                     | .packages[]
                     | .manifest_path as $m
                     | select($prefixes | any(. as $p | $m | contains($p)))
                     | "-p \(.name)"' | tr '\n' ' ')
          echo "shard packages: $PKGS"
          test -n "$PKGS"
          cargo nextest run --profile ci \
            --manifest-path crates/tests/Cargo.toml \
            --lib $PKGS --test-threads 4
