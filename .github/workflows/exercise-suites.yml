name: Exercise Suites

# Weekly bit-rot detection for the test trees CI never touches: the fuzz,
# bench, and loadtest workspaces are standalone (own lockfiles, outside both
# cargo workspaces), so nothing else compiles them. The goal is "still builds
# and smoke-runs", not bug-hunting — fuzz targets get 60s each, benches are
# compile-checked only (criterion timings on shared runners are noise), and
# the loadtest binary must build and answer --help.

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 0"

concurrency:
  group: exercise-suites-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""
  SQLX_OFFLINE: "true"

jobs:
  fuzz-smoke:
    name: Fuzz build + 60s per target
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      # cargo-fuzz needs nightly; rust-toolchain.toml pins the workspace
      # nightly, so the plain toolchain action resolves the same channel.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-03
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/tests
            crates/tests/fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # The fuzz workspace path-depends on core crates whose sqlx query
      # macros are not fully covered by the committed offline caches under
      # every feature combination, so compile against a live migrated DB
      # (same pattern as ci.yml).
      - name: Migrate test database
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
        run: |
          cargo run \
            --manifest-path crates/tests/Cargo.toml \
            -p systemprompt-test-migrate --release
      - name: Build all fuzz targets
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          SQLX_OFFLINE: "false"
        # cargo-fuzz defaults to the musl target here, which the pinned
        # nightly has no std for — pin the host triple explicitly.
        run: cargo fuzz build --fuzz-dir crates/tests/fuzz --target x86_64-unknown-linux-gnu
      - name: Run each target for 60s
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          SQLX_OFFLINE: "false"
        run: |
          for target in $(cargo fuzz list --fuzz-dir crates/tests/fuzz); do
            echo "::group::$target"
            cargo fuzz run --fuzz-dir crates/tests/fuzz --target x86_64-unknown-linux-gnu "$target" -- -max_total_time=60
            echo "::endgroup::"
          done

  bench-check:
    name: Bench compile check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/tests
            crates/tests/bench
      # Same live-DB rationale as fuzz-smoke: bench path-deps hit sqlx
      # queries missing from the offline caches.
      - name: Migrate test database
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
        run: |
          cargo run \
            --manifest-path crates/tests/Cargo.toml \
            -p systemprompt-test-migrate --release
      - name: Compile benches
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          SQLX_OFFLINE: "false"
        run: cargo check --manifest-path crates/tests/bench/Cargo.toml --benches

  loadtest-smoke:
    name: Loadtest build + --help
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/tests/loadtest
      - run: cargo build --manifest-path crates/tests/loadtest/Cargo.toml
      - run: cargo run --manifest-path crates/tests/loadtest/Cargo.toml -- --help
