name: SBOM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sbom:
    name: Generate and attach CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate workspace SBOM
        run: |
          cargo cyclonedx --format json --override-filename systemprompt-sbom
          cargo cyclonedx --format xml  --override-filename systemprompt-sbom

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            systemprompt-sbom.json
            systemprompt-sbom.xml

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            systemprompt-sbom.json \
            systemprompt-sbom.xml \
            --clobber
