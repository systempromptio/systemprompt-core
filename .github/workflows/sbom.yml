name: SBOM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sbom:
    name: Generate and attach CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate per-crate SBOMs
        run: |
          cargo cyclonedx --format json --describe crate
          cargo cyclonedx --format xml  --describe crate

      - name: Bundle facade SBOM for release
        run: |
          mkdir -p sbom-out
          cp systemprompt/systemprompt.cdx.json sbom-out/systemprompt-sbom.json
          cp systemprompt/systemprompt.cdx.xml  sbom-out/systemprompt-sbom.xml
          find . -name "*.cdx.json" | tar -czf sbom-out/systemprompt-sbom-all-crates.tar.gz -T -

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-out/*

      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            sbom-out/systemprompt-sbom.json \
            sbom-out/systemprompt-sbom.xml \
            sbom-out/systemprompt-sbom-all-crates.tar.gz \
            --clobber
