name: Coverage

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1"

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""
  SQLX_OFFLINE: "true"

jobs:
  coverage:
    name: Line coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Strip [unstable] and [profile.dev] from cargo configs
        run: |
          python3 - <<'PY'
          import re, pathlib
          for path in (".cargo/config.toml", "crates/tests/.cargo/config.toml"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text()
              # Drop sections that trigger the unstable `codegen-backend` feature
              # and anything forcing sccache. CI uses stable LLVM default.
              s = re.sub(r'\n\[unstable\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\n\[profile\.dev\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\nRUSTC_WRAPPER\s*=.*', '', s)
              p.write_text(s)
              print(f"--- {path} ---")
              print(p.read_text())
          PY

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/tests

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run test workspace with coverage
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
        run: |
          # `--ignore-run-fail` keeps the run going when a handful of
          # DB-backed lib tests can't resolve their schema in the bare CI
          # Postgres service. Coverage is reported against every test that
          # did run — which is the vast majority of the workspace.
          cargo llvm-cov \
            --manifest-path crates/tests/Cargo.toml \
            --workspace --lib \
            --ignore-run-fail \
            --ignore-filename-regex '(\.cargo|rustc|crates/tests)' \
            --summary-only \
            --json \
            --output-path coverage-summary.json

      - name: Generate text summary
        run: |
          cargo llvm-cov report \
            --manifest-path crates/tests/Cargo.toml \
            --ignore-filename-regex '(\.cargo|rustc|crates/tests)' \
            --summary-only \
            | tee coverage-summary.txt

      - name: Generate LCOV (for downstream tools)
        run: |
          cargo llvm-cov report \
            --manifest-path crates/tests/Cargo.toml \
            --ignore-filename-regex '(\.cargo|rustc|crates/tests)' \
            --lcov \
            --output-path lcov.info

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage-summary.txt
            coverage-summary.json
            lcov.info

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Line coverage"
            echo ""
            echo '```'
            tail -30 coverage-summary.txt 2>/dev/null || echo "(coverage summary not produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
