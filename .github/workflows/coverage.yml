name: Coverage

on:
  workflow_dispatch:
  schedule:
    # Nightly at 06:23 UTC. Coverage is the heaviest job (instrumented build is
    # ~2-3x), so it runs on a schedule rather than on every push to keep pushes
    # fast; trigger manually via workflow_dispatch when an on-demand run is needed.
    - cron: "23 6 * * *"

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write
  # The ratchet step downloads the previous successful run's coverage artifact.
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""
  SQLX_OFFLINE: "true"
  # Keep only line tables (coverage needs line mapping, not full debuginfo),
  # disable incremental artifacts, and serialize codegen: the instrumented
  # cold rebuild of the whole test workspace otherwise peaks past the runner's
  # RAM and the hosted runner loses communication mid-build.
  CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
  CARGO_INCREMENTAL: "0"
  # 2 jobs fits the 16GB runner with line-tables-only debuginfo; 1 job made
  # the --bins --tests instrumented build overrun the job timeout.
  CARGO_BUILD_JOBS: "2"
  # The instrumented --bins --tests target tree does not fit the root disk
  # even after the cleanup step; the runner's second disk at /mnt has ~65GB.
  # One shared target dir also dedupes dependency builds between the main
  # workspace (instrumented CLI) and the test workspace.
  CARGO_TARGET_DIR: /mnt/coverage-target

jobs:
  coverage:
    name: Line coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 350
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Runner resources
        run: |
          echo "cores: $(nproc)"; free -h; df -h /

      - name: Free runner disk (instrumented --bins --tests build overflows the default ~14GB)
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /usr/local/share/boost /usr/local/share/powershell \
            /usr/local/lib/node_modules "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          sudo mkdir -p /mnt/coverage-target /mnt/profraw
          sudo chmod 777 /mnt/coverage-target /mnt/profraw
          df -h / /mnt

      - name: Install libdbus (bridge test bins link keyring -> dbus)
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Strip [unstable] and [profile.dev] from cargo configs
        run: |
          python3 - <<'PY'
          import re, pathlib
          for path in (".cargo/config.toml", "crates/tests/.cargo/config.toml"):
              p = pathlib.Path(path)
              if not p.exists():
                  continue
              s = p.read_text()
              # Drop sections that trigger the unstable `codegen-backend` feature
              # and anything forcing sccache. CI uses stable LLVM default.
              s = re.sub(r'\n\[unstable\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\n\[profile\.dev\][^\[]*', '\n', s, flags=re.S)
              s = re.sub(r'\nRUSTC_WRAPPER\s*=.*', '', s)
              p.write_text(s)
              print(f"--- {path} ---")
              print(p.read_text())
          PY

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/tests
      - uses: taiki-e/install-action@nextest

      - name: Migrate coverage test database
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          # Build the migrate tool against the committed .sqlx cache: the schema
          # it is about to create does not exist yet, so live query verification
          # of its core-crate dependencies would fail on a cold build cache.
          SQLX_OFFLINE: "true"
        run: |
          cargo run \
            --manifest-path crates/tests/Cargo.toml \
            -p systemprompt-test-migrate \
            --release

      - name: Build instrumented systemprompt binary
        env:
          LLVM_PROFILE_FILE: /mnt/profraw/%p-%m.profraw
          RUSTFLAGS: "-C instrument-coverage"
        run: |
          mkdir -p "/mnt/profraw"
          # The crates/tests workspace does not include entry/cli, so the test
          # run's --bins would not produce this binary; subprocess tests invoke
          # it via SYSTEMPROMPT_BIN and its counters land in the shared profraw
          # directory.
          cargo build -p systemprompt-cli --bin systemprompt

      - name: Run instrumented tests (RUSTFLAGS so path deps get instrumented)
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          LLVM_PROFILE_FILE: /mnt/profraw/%p-%m.profraw
          RUSTFLAGS: "-C instrument-coverage"
          SQLX_OFFLINE: "false"
          SYSTEMPROMPT_BIN: /mnt/coverage-target/debug/systemprompt
        run: |
          mkdir -p "/mnt/profraw"
          # nextest runs each test in its own process, so the per-test timeout
          # applies under instrumentation too; %p in LLVM_PROFILE_FILE keeps the
          # profraw files distinct across those processes.
          cargo nextest run --profile ci \
            --manifest-path crates/tests/Cargo.toml \
            --workspace --lib --bins --tests --no-fail-fast
          echo "profraw count: $(find /mnt/profraw -name '*.profraw' | wc -l)"

      - name: Merge profdata and render
        if: always()
        run: |
          LLVM_PROFDATA=$(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-profdata
          LLVM_COV=$(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-cov
          "$LLVM_PROFDATA" merge -sparse \
            "/mnt/profraw"/*.profraw \
            -o coverage-merged.profdata

          # Collect every test binary produced (strip dedup-by-cratename).
          BINS=$(find /mnt/coverage-target/debug/deps -maxdepth 1 -executable -type f -name 'systemprompt_*' ! -name '*.d' -printf '%T@ %p\n' \
            | sort -rn \
            | awk '{ base=$2; sub(".*/", "", base); sub(/-[0-9a-f]+$/, "", base); if (!seen[base]++) print $2 }')
          SP_BIN="/mnt/coverage-target/debug/systemprompt"
          [ -x "$SP_BIN" ] && BINS="$BINS $SP_BIN"
          OBJ_ARGS=""
          for b in $BINS; do OBJ_ARGS="$OBJ_ARGS --object $b"; done

          # Unfiltered first so we can see raw paths llvm-cov emits.
          "$LLVM_COV" report --instr-profile=coverage-merged.profdata $OBJ_ARGS \
            --ignore-filename-regex='(\.cargo|rustc|crates/tests|bin/bridge|/home/runner/\.cargo)' \
            --summary-only \
            | tee coverage-summary.txt

          "$LLVM_COV" export --instr-profile=coverage-merged.profdata $OBJ_ARGS \
            --ignore-filename-regex='(\.cargo|rustc|crates/tests|bin/bridge|/home/runner/\.cargo)' \
            --format=text --summary-only \
            > coverage-summary.json

          "$LLVM_COV" export --instr-profile=coverage-merged.profdata $OBJ_ARGS \
            --ignore-filename-regex='(\.cargo|rustc|crates/tests|bin/bridge|/home/runner/\.cargo)' \
            --format=lcov \
            > lcov.info

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage-summary.txt
            coverage-summary.json
            lcov.info

      - name: Coverage ratchet (fail on >0.5pt drop vs previous run)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_ID=$(gh run list --workflow coverage.yml --status success \
            --branch main --limit 1 --json databaseId --jq '.[0].databaseId' \
            -R "${{ github.repository }}")
          if [ -z "$PREV_ID" ] || [ "$PREV_ID" = "null" ]; then
            echo "no previous successful run; skipping ratchet"
            exit 0
          fi
          if ! gh run download "$PREV_ID" -n coverage -D prev-coverage \
               -R "${{ github.repository }}"; then
            echo "previous run $PREV_ID has no coverage artifact (expired?); skipping ratchet"
            exit 0
          fi
          python3 - <<'PY'
          import json, sys
          def pct(path):
              with open(path) as f:
                  return json.load(f)["data"][0]["totals"]["lines"]["percent"]
          prev, cur = pct("prev-coverage/coverage-summary.json"), pct("coverage-summary.json")
          print(f"previous: {prev:.2f}%  current: {cur:.2f}%  delta: {cur - prev:+.2f}pt")
          if cur < prev - 0.5:
              sys.exit(f"line coverage dropped more than 0.5pt ({prev:.2f}% -> {cur:.2f}%)")
          PY

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          use_oidc: true

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Line coverage"
            echo ""
            echo '```'
            tail -30 coverage-summary.txt 2>/dev/null || echo "(coverage summary not produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
