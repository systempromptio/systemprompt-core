name: Release (build + sign)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build and sign"
        required: true

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-13
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build systemprompt-cowork
        shell: bash
        run: |
          cargo build \
            --manifest-path bin/cowork/Cargo.toml \
            --release \
            --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          SRC="bin/cowork/target/${{ matrix.target }}/release/systemprompt-cowork${{ matrix.ext }}"
          if [ ! -f "$SRC" ]; then
            SRC="target/${{ matrix.target }}/release/systemprompt-cowork${{ matrix.ext }}"
          fi
          cp "$SRC" "dist/systemprompt-cowork-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  sign-and-release:
    name: Sign and publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-raw

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find dist-raw -type f -exec cp {} dist/ \;
          ls -la dist

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts with cosign (keyless, OIDC)
        working-directory: dist
        env:
          COSIGN_YES: "true"
        run: |
          for f in *; do
            if [ "$f" = "SHA256SUMS" ]; then
              continue
            fi
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          cosign sign-blob --yes \
            --output-signature "SHA256SUMS.sig" \
            --output-certificate "SHA256SUMS.pem" \
            SHA256SUMS

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: dist
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            --clobber \
            *
